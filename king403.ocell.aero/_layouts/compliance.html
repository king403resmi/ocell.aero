<!DOCTYPE html>
<html lang="{{ site.lang | default: 'id' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <meta name="theme-color" content="{{ site.theme_bg }}">
  <link rel="icon" href="{{ '/assets/img/icon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  {% include schema.html %}
</head>
<body class="layout-compliance">
  <a class="skip" href="#main">Lewati ke konten</a>
  <header class="comp-header wrap">
    <div class="comp-header__top">
      <a class="comp-logo" href="{{ '/' | relative_url }}">{{ site.site_name }}</a>
      <span class="comp-seal">Verified Brand Portal</span>
    </div>
    <nav class="comp-nav">{% include nav.html %}</nav>
  </header>
  <main id="main" class="wrap page page--compliance">
    <div class="comp-doc">{{ content }}</div>
  </main>
  {% include footer.html %}
</body>
</html>
