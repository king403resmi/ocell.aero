<!DOCTYPE html>
<html lang="{{ site.lang | default: 'id' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <meta name="theme-color" content="{{ site.theme_bg }}">
  <link rel="icon" href="{{ '/assets/img/icon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  {% include schema.html %}
</head>
<body class="layout-dashboard">
  <a class="skip" href="#main">Lewati ke konten</a>
  <header class="dash-bar">
    <div class="wrap dash-bar__row">
      <a class="dash-logo" href="{{ '/' | relative_url }}">
        <span class="dash-dot"></span>{{ site.site_name }}
      </a>
      <nav class="dash-nav">{% include nav.html %}</nav>
    </div>
  </header>
  <main id="main" class="wrap page page--dashboard">{{ content }}</main>
  {% include footer.html %}
</body>
</html>
