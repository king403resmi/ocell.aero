<!DOCTYPE html>
<html lang="{{ site.lang | default: 'id' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <meta name="theme-color" content="{{ site.theme_bg }}">
  <link rel="icon" href="{{ '/assets/img/icon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  {% include schema.html %}
</head>
<body class="layout-tech">
  <a class="skip" href="#main">Lewati ke konten</a>
  <header class="site-nav site-nav--tech">
    <div class="site-nav__inner">
      <a class="site-nav__logo" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/img/icon.svg' | relative_url }}" alt="Logo {{ site.site_name }}" width="36" height="36">
        <span>{{ site.site_name }}</span>
      </a>
      {% include nav.html %}
    </div>
    <p class="site-tagline">{{ site.description }}</p>
  </header>
  <main id="main" class="wrap page page--tech">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
